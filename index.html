<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakhtiyar Maratuly \u2014 Resume</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent2: #3dffa0;
    --text: #e8e8e8;
    --muted: #888;
    --tag-bg: #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Lang switcher */
  .lang-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: flex-end;
    gap: 2px;
    padding: 12px 32px;
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .lang-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .lang-btn:hover, .lang-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* Page */
  .page { display: none; }
  .page.active { display: block; }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 100px 32px 80px;
  }

  /* Header */
  .header {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 40px;
    align-items: start;
    margin-bottom: 60px;
    padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    filter: grayscale(20%);
  }

  .header-info {}

  .name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .title {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
  }

  .contacts a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contacts a:hover { color: var(--accent); }

  /* Sections */
  .section {
    margin-bottom: 52px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* About */
  .about-text {
    font-size: 14px;
    line-height: 1.8;
    color: #bbb;
    max-width: 680px;
  }

  /* Experience */
  .job {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 24px;
    margin-bottom: 36px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--border);
  }

  .job:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .job-meta {
    padding-top: 2px;
  }

  .job-period {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .job-company {
    font-size: 11px;
    color: var(--accent2);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .job-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .job-desc {
    font-size: 13px;
    line-height: 1.75;
    color: #aaa;
  }

  .job-bullets {
    margin-top: 8px;
    padding-left: 0;
    list-style: none;
  }

  .job-bullets li {
    font-size: 13px;
    line-height: 1.75;
    color: #aaa;
    padding-left: 16px;
    position: relative;
    margin-bottom: 4px;
  }

  .job-bullets li::before {
    content: '\u2192';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
    top: 2px;
  }

  /* Education */
  .edu-item {
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .edu-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .edu-school {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    margin-bottom: 4px;
  }

  .edu-degree {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .edu-year {
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
  }

  /* Skills */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .skill-group {}

  .skill-group-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: #ccc;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Languages */
  .lang-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .lang-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 340px;
  }

  .lang-name {
    font-size: 13px;
    color: #ccc;
  }

  .lang-level {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.08em;
  }

  .lang-bar-track {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin: 0 16px;
    position: relative;
  }

  .lang-bar-fill {
    height: 100%;
    background: var(--accent);
    position: absolute;
    left: 0;
  }

  /* Animate on load */
  .fade-in {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .header { animation-delay: 0.05s; }
  .section:nth-child(1) { animation-delay: 0.1s; }
  .section:nth-child(2) { animation-delay: 0.15s; }
  .section:nth-child(3) { animation-delay: 0.2s; }
  .section:nth-child(4) { animation-delay: 0.25s; }
  .section:nth-child(5) { animation-delay: 0.3s; }

  @media (max-width: 600px) {
    .container { padding: 88px 20px 60px; }
    .header { grid-template-columns: 1fr; gap: 20px; }
    .job { grid-template-columns: 1fr; gap: 8px; }
    .skills-grid { grid-template-columns: 1fr; }
    .lang-bar { padding: 12px 16px; }
    .lang-btn { padding: 5px 10px; }
  }
</style>
</head>
<body>
